{%load static%}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Now</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static 'style/style.css' %}?v=1">
</head>

<body class="r">
    <section class="ab">
                <div class="card"  height="80%" style="width: 20rem;">
                    <div class="card-body">
                        <img src="{%static 'img/logo.png'%}" alt="Weducation logo" width="40%">
                        <h5>Register</h5>
                       
                        <form method="post" enctype="multipart/form-data" action="{% url 'register' %}">
                             {% csrf_token %}

                            <div class="input-box">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" placeholder="Enter your name" name="username">
                            </div>

                            <div class="input-box">
                                <i class="fa-regular fa-envelope"></i>
                                <input type="email" placeholder="Enter your email" name="email">
                            </div>

                            <div class="input-box">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" placeholder="Create a password" name="password">
                                <i class="fa-regular fa-eye eye"></i>
                            </div>
                            <div class="input-box">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" placeholder="Confirm a password" name="confirmpassword">
                                <i class="fa-regular fa-eye eye"></i>
                            </div>

                            <div class="terms">
                                <input type="checkbox">
                                <label> I accept all terms & conditions</label>
                            </div>

                            <button class="btn btn-primary" submit">Register</button>

                            <p class="login">
                                Already have an account?
                                <a href="{%url 'userlogin'%}">Login Now</a>
                            </p>
                            </form>
                        </div>
                    </div>
                </div>
    </section>



</body>

</html>
