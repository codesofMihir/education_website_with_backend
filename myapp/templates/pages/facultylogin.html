{% extends 'base.html'%}
{% load static %}
{% block title %}Faculty Login{% endblock%}

{% block body_class %}ir{% endblock %}
{% block content %}
<section class="ulogin">
    <div class="card" style="width: 18rem;">
        <div class="card-body">
            <img src="{%static 'img/logo.png'%}" alt="Weducation logo" width="40%">
            <p>FACULTY LOGIN</p>

            <form method="post" action="{% url 'facultylogin' %}">
                {% csrf_token %}

                <div class="name">
                    <label for="username">Username</label>
                    <input type="text" placeholder="username" id="username" class="form-control" name="username">
                </div>

                <div class="pass">
                    <label for="password">Password</label>
                    <input type="password" placeholder=" enter 8 digit password" id="password" class="password-input"
                        name="password">
                    <i class="fa-regular fa-eye eye" id="faculty-eye" aria-label="Toggle password visibility"
                        role="button" tabindex="0"></i>
                </div>

                <script>
                    (function () {
                        const eye = document.getElementById('faculty-eye');
                        const input = document.getElementById('password');
                        if (!eye || !input) return;

                        function toggle() {
                            const isHidden = input.type === 'password';
                            input.type = isHidden ? 'text' : 'password';
                            eye.classList.toggle('fa-eye-slash', isHidden);
                        }

                        eye.addEventListener('click', toggle);
                        eye.addEventListener('keydown', function (e) {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                toggle();
                            }
                        });
                    })();
                </script>

                <div class="options">
                    <label class="remember"></label>
                    <input type="checkbox">Remember me
                    <a href="#" class="forget">Forget Password</a>
                </div>

                <button type="submit" class="btn btn-primary">submit</button>
                <div class="sign-up">
                    New student? <a href="#">Create an account</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
