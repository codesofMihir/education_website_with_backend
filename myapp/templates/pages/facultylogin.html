{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
  integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
  crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="{% static 'style/style.css' %}?v=1">
</head>

<body class="ir">
    <section class="ulogin">
            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <img src="{%static 'img/logo.png'%}" alt="Weducation logo" width="40%">
                    <p>FACULTY LOGIN</p>
                    <form>
                        <div class="name">
                            <label for="username">Username</label>
                            <input type="text" placeholder="username" id="username" class="form-control">
                        </div>


                        <div class="pass">
                            <label for="password">Password</label>
                            <input type="password" placeholder=" enter 8 digit password" id="password">
                        </div>

                        <div class="options">
                            <label class="remember"></label>
                            <input type="checkbox">Remember me

                            <a href="#" class="forget">Forget Password</a>
                        </div>

                        <button type="submit" class="btn btn-primary" onclick="login(event)">submit</button>
                        <div class="sign-up">
                            New student? <a href="#">Create an account</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>

        </div>
        </div>
    </section>

    <script>
                        function login(event) {
                            event.preventDefault();

                            var username = document.getElementById("username").value;
                            var password = document.getElementById("password").value;

                            if (username !== "" && password !== "") {
                                window.location.href = "facultydashboard.html";
                            } else {
                                alert("Please enter username and password!");
                            }
                        }
                    </script>



    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
        crossorigin="anonymous"></script>
</body>

</html>
