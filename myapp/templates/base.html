{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Weducation | Online Education Portal {% endblock%}</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="{% static 'style/style.css' %}?v=1">
  <link rel="icon" type="img/png" href="{% static 'img/logo.png' %}">

</head>

<body class="{% block body_class %}{% endblock %}">
    {% block content %}

    {% endblock %}
  <section class="b">
    <div class="footer">
      <footer class="bg-dark text-white text-center p-4">
        <div class="social-links">
          <a href="https://facebook.com" target="_blank" rel="noopener noreferrer">Facebook<i
              class="fa-brands fa-facebook"></i></a>
          <a href="https://twitter.com" target="_blank" rel="noopener noreferrer">Twitter<i
              class="fa-brands fa-twitter"></i></a>
          <a href="https://youtube.com" target="_blank" rel="noopener noreferrer">youtube<i
              class="fa-brands fa-youtube-square"></i></a>
          <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">Instagram<i
              class="fa-brands fa-instagram"></i></a>
          <p class="copyright">Copyright © 2026 Education.com, Inc, a division of IXL Learning • All Rights Reserved.
          </p>
        </div>
      </footer>
    </div>
  </section>

  

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
    integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"

</html>
